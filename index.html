<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forum Data Filter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* Cấu hình màu sắc cho cả 2 chế độ */
        :root[data-theme="light"] {
    --bg-color: #f8fafc;          /* Nền xám trắng rất dịu */
    --text-color: #1e293b;        /* Chữ chính màu than đá */
    --sub-text: #64748b;          /* Chữ phụ xám */
    --border-color: #e2e8f0;      /* Đường viền mảnh */
    --card-bg: #ffffff;
    
    /* Đồng bộ các nút hành động về một màu tối giản thanh lịch */
    --accent-color: #0f172a;      /* Đen xám đậm (Deep Slate) thay cho xanh dương */
    --accent-hover: #334155;
    --random-color: #475569;      /* Đồng tone xám thay cho màu xanh lá */
    
    --hover-bg: #f1f5f9;
    --card-shadow: 0 1px 3px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.04);
    --card-shadow-hover: 0 4px 12px rgba(15, 23, 42, 0.05);
    
    --star-color: #94a3b8;
    --star-active: #dc2626;       /* Đổi thành đỏ nhẹ/hồng nhạt hoặc giữ vàng tinh tế */
    --badge-bg: #f1f5f9;
    --badge-text: #64748b;
    
    --logo-color: #0f172a;
    --tagline-color: #64748b;
    --search-bg: #ffffff;
    --search-focus: #0f172a;
    --toggle-bg: #e2e8f0;
}

:root[data-theme="dark"] {
    --bg-color: #0b0f19;          /* Nền đêm sâu thanh lịch */
    --text-color: #e2e8f0;        /* Chữ trắng xám không bị lóa */
    --sub-text: #64748b;
    --border-color: #1e293b;
    --card-bg: #111827;           /* Card tối nhẹ */
    
    --accent-color: #f1f5f9;      /* Nút active màu sáng hẳn */
    --accent-hover: #cbd5e1;
    --random-color: #94a3b8;
    
    --hover-bg: #1f2937;
    --card-shadow: none;          /* Giao diện tối không cần đổ bóng mạnh */
    --card-shadow-hover: none;
    
    --star-color: #475569;
    --star-active: #f59e0b;
    --badge-bg: #1f2937;
    --badge-text: #94a3b8;
    
    --logo-color: #ffffff;
    --tagline-color: #64748b;
    --search-bg: #111827;
    --search-focus: #94a3b8;
    --toggle-bg: #1f2937;
}


        :root[data-theme="dark"] {
            --bg-color: #0f172a;
            --text-color: #f1f5f9;
            --border-color: #334155;
            --card-bg: #1e293b;
            --accent-color: #60a5fa;
            --accent-hover: #93c5fd;
            --random-color: #34d399;
            --random-hover: #6ee7b7;
            --refresh-color: #22d3ee;
            --refresh-hover: #67e8f9;
            --hover-bg: #1e293b;
            --item-border: #334155;
            --sub-text: #94a3b8;
            --search-bg: #1e293b;
            --search-focus: #60a5fa;
            --toggle-bg: #334155;
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            --card-shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            --star-color: #475569;
            --star-active: #f59e0b;
            --badge-bg: #334155;
            --badge-text: #cbd5e1;
            
            --logo-color: #ffffff;
            --tagline-color: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 800px;
            margin: 0 auto 40px auto;
            padding: 0 20px;
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
        }

    .sticky-header {
            position: -webkit-sticky; /* Hỗ trợ Safari cũ trên iOS */
            position: sticky;
            top: 0;
            z-index: 100;
            background-color: var(--bg-color); /* Đổ nền để đè lên nội dung danh sách khi cuộn xuống */
            padding-top: 1px; /* Tránh lỗi lọt lề margin của các phần tử con */
            transition: background-color 0.3s; /* Mượt mà khi đổi Dark/Light mode */
            padding-bottom: 16px; /* Đây chính là khoảng trống cố định mong muốn (ví dụ 16px hoặc 20px) */
            box-sizing: border-box;
        }
    
        /* Top Utilities Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .sub-links-container {
            display: flex;
            gap: 16px;
        }

        .sub-link {
            font-size: 12px;
            color: var(--sub-text);
            text-decoration: none;
            opacity: 0.8;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .sub-link:hover {
            opacity: 1;
            color: var(--accent-color);
        }

        .btn-theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: var(--card-shadow);
            font-size: 16px;
        }

        .btn-theme-toggle:hover {
            background-color: var(--hover-bg);
            transform: scale(1.05);
        }

        .brand-container {
            text-align: center;
            margin: 32px 0 40px 0;
        }

        .brand-logo {
            font-family: "Playfair Display", "Georgia", "Times New Roman", serif;
            font-size: 46px;
            font-weight: 700;
            color: var(--logo-color);
            margin: 0;
            letter-spacing: 0.5px;
            line-height: 1.1;
            transition: color 0.3s ease;
        }

        .brand-tagline {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--tagline-color);
            margin: 10px 0 0 0;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .source-toggle-container {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .source-toggle {
            display: inline-flex;
            background-color: var(--toggle-bg);
            padding: 4px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
        }

        .btn-source {
            background: transparent;
            border: none;
            color: var(--text-color);
            padding: 8px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-source.active {
            background-color: var(--card-bg);
            color: var(--accent-color);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .filter-container {
            display: flex;
            flex-wrap: nowrap;
            gap: 8px;
            margin-bottom: 24px;
            overflow-x: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding: 4px 4px 10px 4px;
        }

        .filter-container::-webkit-scrollbar {
            display: none;
        }

        .btn-tab {
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    color: var(--text-color);
    
    /* CHỈNH SỬA TẠI ĐÂY: Thu nhỏ padding và chữ */
    padding: 5px 12px;          /* Giảm chiều cao rõ rệt (cũ là 8px 16px) */
    font-size: 11.5px;          /* Hạ font chữ xuống một chút để phân biệt với nút lớn */
    border-radius: 14px;        /* Giảm bo góc tương ứng với chiều cao mới */
    
    cursor: pointer;
    font-weight: 500;
    white-space: nowrap;
    transition: all 0.2s ease;
    box-shadow: var(--card-shadow);
    display: inline-flex;
    align-items: center;
    gap: 5px;                   /* Thu hẹp khoảng cách giữa chữ và số lượng bài viết */
}

/* Hạ size của badge số lượng bên trong nút tương ứng */
.tab-badge {
    font-size: 9.5px;           /* Nhỏ hơn chữ tiêu đề một chút (cũ là 11px) */
    padding: 1px 5px;           /* Thu nhỏ badge lại cho vừa vặn */
    border-radius: 8px;
    font-weight: 600;
    background-color: var(--badge-bg);
    color: var(--badge-text);
}


        .btn-tab:hover {
            border-color: var(--accent-color);
            background-color: var(--hover-bg);
        }

        .btn-tab.active {
            background-color: var(--accent-color);
            color: #ffffff;
            border-color: var(--accent-color);
        }

        .tab-badge {
            font-size: 11px;
            background-color: var(--badge-bg);
            color: var(--badge-text);
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 600;
        }

        .btn-tab.active .tab-badge {
            background-color: rgba(255, 255, 255, 0.25);
            color: #ffffff;
        }

        .action-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 0px;
            align-items: center;
        }

        .search-container {
            position: relative;
            flex: 1;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            font-size: 14px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background-color: var(--search-bg);
            color: var(--text-color);
            box-sizing: border-box;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: var(--card-shadow);
        }

        .search-input:focus {
            border-color: var(--search-focus);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: var(--sub-text);
            pointer-events: none;
            transition: fill 0.2s ease;
        }

        .search-input:focus + .search-icon {
            fill: var(--search-focus);
        }

        .btn-action-util {
            height: 45px;
            padding: 0 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
            box-shadow: var(--card-shadow);
            white-space: nowrap;
        }

        .btn-random {
    background-color: var(--badge-bg);
    color: var(--text-color);
    border: 1px solid var(--border-color); /* Đồng bộ với ô search */
    border-radius: 12px;
}
.btn-random:hover {
    background-color: var(--hover-bg);
}
.btn-random:active {
    background-color: var(--accent-color) !important;
    color: var(--card-bg) !important;
}


        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 100px;
        }

        .post-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.25s ease;
            box-shadow: var(--card-shadow);
        }

        .post-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--card-shadow-hover);
            border-color: var(--accent-color);
            background-color: rgba(0, 0, 0, 0.01); /* Nhấn nhẹ khi hover */
        }

        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            object-fit: cover; 
            background-color: var(--badge-bg);
            border: 1px solid var(--border-color);
        }

        .post-content-block {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .post-title {
            font-weight: 600; 
            color: var(--text-color);
            text-decoration: none;
            font-size: 15px;
            transition: all 0.2s;
            line-height: 1.4;
        }

        .post-title:hover {
            color: var(--accent-color);
        }

        .post-item.is-read .post-title {
            opacity: 0.45;
            font-weight: 400;
        }

        .post-source {
            font-size: 12px;
            color: var(--sub-text);
            font-weight: 500;
        }

        .btn-bookmark {
            background: transparent;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--star-color);
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, color 0.2s;
            user-select: none;
        }

        .btn-bookmark:hover {
            transform: scale(1.2);
        }

        .btn-bookmark.active {
            color: var(--star-active);
        }

        .empty-message {
            text-align: center;
            color: var(--sub-text);
            padding: 40px var(--card-bg);
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .pagination-container, .random-nav-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-top: 32px;
            flex-wrap: wrap;
        }

        .btn-page, .btn-nav {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            min-width: 38px;
            height: 38px;
            padding: 0 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: var(--card-shadow);
        }

        .btn-page:hover:not(:disabled), .btn-nav:hover:not(:disabled) {
            border-color: var(--accent-color);
            background-color: var(--hover-bg);
        }

        .btn-page.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .btn-page:disabled, .btn-nav:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .post-item {
            animation: fadeIn 0.3s ease-in-out;
        }
            
        @media (max-width: 600px) {
            .action-bar {
                align-items: stretch;
            }
            .btn-action-util {
                height: 42px;
            }
            .brand-logo {
                font-size: 36px;
            }
            .brand-tagline {
                font-size: 12px;
                letter-spacing: 2px;
            }
        }
    </style>
</head>

    <script>
        let masterData = { vn: {}, int: {} };
        let activeSource = 'all'; 
        let forumsData = {}; 
        let currentDomain = 'all';
        let currentPage = 1;
        let searchQuery = '';
        let searchTimeout;
        const postsPerPage = 50;

        let randomHistory = [];
        let currentRandomIndex = -1;

        let readHistory = JSON.parse(localStorage.getItem('read_history')) || [];
        let bookmarks = JSON.parse(localStorage.getItem('bookmarks')) || [];
        const defaultAvatar = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2394a3b8'><path d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.53c-.26-.81-1-1.4-1.9-1.4h-1v-3c0-.55-.45-1-1-1h-6v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z'/></svg>";

        const filterContainer = document.getElementById('filterContainer');
        const listContainer = document.getElementById('listContainer');
        const paginationContainer = document.getElementById('paginationContainer');
        const randomNavContainer = document.getElementById('randomNavContainer');
        const btnRandom = document.getElementById('btnRandom');
        const btnThemeToggle = document.getElementById('btnThemeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const searchInput = document.getElementById('searchInput');

        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeUI(savedTheme);

        btnThemeToggle.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeUI(newTheme);
        });

        function updateThemeUI(theme) {
            themeIcon.textContent = theme === 'dark' ? '🌙' : '☀️';
        }

        // ================= GIẢI PHÁP HEAD REQUEST TRÁNH TẢI FILE 10MB KHI F5 =================
        async function checkFileChanged(fileName) {
            try {
                // Chỉ lấy phần đầu Metadata (vài byte), không GET nội dung file
                const response = await fetch(fileName, { method: 'HEAD', cache: 'no-cache' });
                if (!response.ok) return true; 
                
                const currentTag = response.headers.get('ETag') || response.headers.get('Last-Modified');
                if (!currentTag) return true;

                const savedTag = localStorage.getItem(`tag_${fileName}`);
                if (savedTag === currentTag) {
                    return false; // File không đổi -> Tiếp tục dùng dữ liệu trong bộ nhớ IndexedDB
                }
                
                localStorage.setItem(`tag_${fileName}`, currentTag);
                return true; 
            } catch (e) {
                console.warn(`Không check được mã HEAD cho ${fileName}, sử dụng chế độ an toàn.`, e);
                return true; 
            }
        }

                async function loadExternalData() {
            try {
                if (!document.getElementById('spin-animation')) {
                    const style = document.createElement('style');
                    style.id = 'spin-animation';
                    style.innerHTML = `@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }`;
                    document.head.appendChild(style);
                }

                // Thử lấy dữ liệu cũ lên trước để hiển thị lập tức khi người dùng F5
                const cachedVnText = await localforage.getItem('cached_data_vn_text');
                const cachedIntText = await localforage.getItem('cached_data_int_text');

                // Kiểm tra xem đây có phải lần đầu tiên truy cập (chưa có dữ liệu cache) không
                const isFirstTime = (cachedVnText === null && cachedIntText === null);

                let needFetchVn = true;
                let needFetchInt = true;

                if (cachedVnText !== null) needFetchVn = await checkFileChanged('data_vn.txt');
                if (cachedIntText !== null) needFetchInt = await checkFileChanged('data_int.txt');

                // TRƯỜNG HỢP PHỔ BIẾN: F5 nhưng bạn chưa push bài mới lên server (Dùng luôn cache)
                if (!needFetchVn && !needFetchInt) {
                    masterData = { vn: {}, int: {} };
                    if (cachedVnText) parseToSource(cachedVnText.split('\n'), 'vn');
                    if (cachedIntText) parseToSource(cachedIntText.split('\n'), 'int');
                    updateCurrentForumsData();
                    return; // Ngắt hàm, tiết kiệm 10MB băng thông mạng!
                }

                // Tạo nội dung thông báo động dựa trên việc tải lần đầu hay cập nhật bài viết mới
                let loadingTitle = "Đang cập nhật bài viết mới...";
                let loadingSubtitle = "Hệ thống đang đồng bộ những bài viết mới nhất từ máy chủ.";

                if (isFirstTime) {
                    loadingTitle = "Đang khởi tạo dữ liệu lần đầu...";
                    loadingSubtitle = "Dữ liệu sau này sẽ được tải từ bộ nhớ cục bộ (siêu nhanh).";
                }

                // Hiển thị trạng thái chờ tải đồng bộ ra giao diện
                listContainer.innerHTML = `
                    <div class="loading-wrapper" style="text-align: center; padding: 40px 20px;">
                        <div class="spinner" style="
                            width: 40px; 
                            height: 40px; 
                            border: 4px solid var(--border-color); 
                            border-top: 4px solid var(--accent-color); 
                            border-radius: 50%; 
                            margin: 0 auto 20px; 
                            animation: spin 1s linear infinite;
                        "></div>
                        <div class="loading-title" style="font-weight: 600; font-size: 16px; color: var(--text-color); margin-bottom: 6px;">
                            ${loadingTitle}
                        </div>
                        <div class="loading-subtitle" style="font-size: 13px; color: var(--sub-text); max-width: 400px; margin: 0 auto; line-height: 1.4;">
                            ${loadingSubtitle}
                        </div>
                    </div>
                `;

                masterData = { vn: {}, int: {} };
                const suffix = `?t=${Date.now()}`;

                let freshVnText = cachedVnText;
                let freshIntText = cachedIntText;

                // Chỉ thực hiện GET nội dung nếu lệnh kiểm tra HEAD báo hiệu có sự thay đổi hoặc tải lần đầu
                if (needFetchVn) {
                    const resVn = await fetch(`data_vn.txt${suffix}`, { cache: 'no-cache' });
                    freshVnText = resVn.ok ? await resVn.text() : '';
                    if (freshVnText) await localforage.setItem('cached_data_vn_text', freshVnText);
                }
                if (needFetchInt) {
                    const resInt = await fetch(`data_int.txt${suffix}`, { cache: 'no-cache' });
                    freshIntText = resInt.ok ? await resInt.text() : '';
                    if (freshIntText) await localforage.setItem('cached_data_int_text', freshIntText);
                }

                if (freshVnText) parseToSource(freshVnText.split('\n'), 'vn');
                if (freshIntText) parseToSource(freshIntText.split('\n'), 'int');

                updateCurrentForumsData();
            } catch (error) {
                console.error("Lỗi hệ thống:", error);
                const cachedVnText = await localforage.getItem('cached_data_vn_text');
                const cachedIntText = await localforage.getItem('cached_data_int_text');
                if (cachedVnText || cachedIntText) {
                    masterData = { vn: {}, int: {} };
                    if (cachedVnText) parseToSource(cachedVnText.split('\n'), 'vn');
                    if (cachedIntText) parseToSource(cachedIntText.split('\n'), 'int');
                    updateCurrentForumsData();
                } else {
                    listContainer.innerHTML = `<div class="empty-message" style="color: #ef4444;">Không thể kết nối máy chủ dữ liệu.</div>`;
                }
            }
        }


        function parseToSource(dataArray, sourceType) {
            dataArray.forEach(item => {
                const parts = item.split('|');
                if (parts.length < 2) return;
                const title = parts[0].trim();
                const url = parts[1].trim();
                try {
                    const urlObj = new URL(url);
                    const domain = urlObj.hostname.replace('www.', '');
                    if (!masterData[sourceType][domain]) masterData[sourceType][domain] = [];
                    masterData[sourceType][domain].push({ title, url, domain });
                } catch (e) {}
            });
        }
        // =====================================================================================

        function updateCurrentForumsData() {
            forumsData = {};
            if (activeSource === 'all' || activeSource === 'vn') {
                for (const [domain, posts] of Object.entries(masterData.vn)) {
                    if (!forumsData[domain]) forumsData[domain] = [];
                    forumsData[domain] = forumsData[domain].concat(posts);
                }
            }
            if (activeSource === 'all' || activeSource === 'int') {
                for (const [domain, posts] of Object.entries(masterData.int)) {
                    if (!forumsData[domain]) forumsData[domain] = [];
                    forumsData[domain] = forumsData[domain].concat(posts);
                }
            }
            renderTabs();
        }

        function renderTabs() {
            filterContainer.innerHTML = ''; 
            if (Object.keys(forumsData).length === 0 && bookmarks.length === 0) {
                listContainer.innerHTML = '<div class="empty-message">Không có dữ liệu hợp lệ để hiển thị.</div>';
                paginationContainer.innerHTML = '';
                randomNavContainer.innerHTML = '';
                return;
            }
            let totalAllPostsCount = 0;
            Object.values(forumsData).forEach(posts => { totalAllPostsCount += posts.length; });

            createTabButton('Yêu thích ⭐', 'fav_bookmarks', bookmarks.length);
            createTabButton('Tất cả bài viết', 'all', totalAllPostsCount);
            Object.keys(forumsData).forEach(domain => { createTabButton(domain.toUpperCase(), domain, forumsData[domain].length); });

            const tabs = filterContainer.querySelectorAll('.btn-tab');
            let targetTab = tabs[1]; 
            tabs.forEach(tab => { if (tab.getAttribute('data-domain') === currentDomain) targetTab = tab; });
            if (targetTab) targetTab.click();
        }

        function createTabButton(label, domainKey, count) {
            const button = document.createElement('button');
            button.className = 'btn-tab';
            button.setAttribute('data-domain', domainKey);
            const labelSpan = document.createElement('span');
            labelSpan.textContent = label;
            button.appendChild(labelSpan);
            const badge = document.createElement('span');
            badge.className = 'tab-badge';
            badge.textContent = count;
            button.appendChild(badge);
            if (domainKey === currentDomain) button.classList.add('active');
            button.addEventListener('click', () => {
                document.querySelectorAll('.btn-tab').forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
                currentDomain = domainKey;
                currentPage = 1;
                resetRandomHistory(); 
                displayPosts();
            });
            filterContainer.appendChild(button);
        }

        function getActivePosts() {
            let targetPosts = [];
            if (currentDomain === 'fav_bookmarks') { targetPosts = [...bookmarks]; }
            else if (currentDomain === 'all') { Object.values(forumsData).forEach(posts => { targetPosts = targetPosts.concat(posts); }); }
            else { targetPosts = forumsData[currentDomain] || []; }
            if (searchQuery !== '') { targetPosts = targetPosts.filter(post => post.title.toLowerCase().includes(searchQuery)); }
            return targetPosts;
        }

        function displayPosts() {
            listContainer.innerHTML = ''; 
            randomNavContainer.innerHTML = ''; 
            const targetPosts = getActivePosts();
            if (targetPosts.length === 0) {
                listContainer.innerHTML = '<div class="empty-message">Không tìm thấy bài viết nào phù hợp.</div>';
                paginationContainer.innerHTML = '';
                return;
            }
            const totalPages = Math.ceil(targetPosts.length / postsPerPage);
            if (currentPage > totalPages) currentPage = totalPages || 1;
            const startIndex = (currentPage - 1) * postsPerPage;
            const paginatedPosts = targetPosts.slice(startIndex, startIndex + postsPerPage);

            paginatedPosts.forEach(post => {
                renderPostCard(post);
            });
            renderPagination(totalPages);
        }

        function renderPostCard(post) {
            const isRead = readHistory.includes(post.url);
            const isBookmarked = bookmarks.some(b => b.url === post.url);
            const faviconUrl = `https://www.google.com/s2/favicons?domain=${post.domain}&sz=64`;

            const postItem = document.createElement('div');
            postItem.className = `post-item ${isRead ? 'is-read' : ''}`;
            postItem.innerHTML = `
                <img class="post-avatar" src="${faviconUrl}" alt="${post.domain}" onerror="this.onerror=null; this.src='${defaultAvatar}';">
                <div class="post-content-block">
                    <a href="${post.url}" target="_blank" class="post-title">${post.title}</a>
                    <span class="post-source">Nguồn: ${post.domain}</span>
                </div>
                <button class="btn-bookmark ${isBookmarked ? 'active' : ''}" title="Đánh dấu yêu thích">${isBookmarked ? '★' : '☆'}</button>
            `;

            postItem.querySelector('.post-title').addEventListener('click', () => {
                if (!readHistory.includes(post.url)) {
                    readHistory.push(post.url);
                    localStorage.setItem('read_history', JSON.stringify(readHistory));
                    postItem.classList.add('is-read');
                }
            });

            postItem.querySelector('.btn-bookmark').addEventListener('click', (e) => {
                e.stopPropagation();
                let currentBookmarks = JSON.parse(localStorage.getItem('bookmarks')) || [];
                const foundIndex = currentBookmarks.findIndex(b => b.url === post.url);
                let isNowBookmarked = false;

                if (foundIndex > -1) { 
                    currentBookmarks.splice(foundIndex, 1); 
                } else { 
                    currentBookmarks.push({ title: post.title, url: post.url, domain: post.domain }); 
                    isNowBookmarked = true;
                }
                
                bookmarks = currentBookmarks;
                localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
                
                const favTab = filterContainer.querySelector('[data-domain="fav_bookmarks"] .tab-badge');
                if (favTab) favTab.textContent = bookmarks.length;
                
                const btnTarget = e.currentTarget;
                if (isNowBookmarked) {
                    btnTarget.classList.add('active');
                    btnTarget.textContent = '★';
                } else {
                    btnTarget.classList.remove('active');
                    btnTarget.textContent = '☆';
                    if (currentDomain === 'fav_bookmarks') {
                        postItem.remove();
                        if (listContainer.children.length === 0) {
                            listContainer.innerHTML = '<div class="empty-message">Không tìm thấy bài viết nào phù hợp.</div>';
                        }
                    }
                }
            });

            listContainer.appendChild(postItem);
        }

        function renderPagination(totalPages) {
            paginationContainer.innerHTML = '';
            if (totalPages <= 1) return;
            const prevBtn = document.createElement('button');
            prevBtn.className = 'btn-page'; prevBtn.innerHTML = '&laquo;'; prevBtn.disabled = currentPage === 1;
            prevBtn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; displayPosts(); window.scrollTo({ top: 0, behavior: 'smooth' }); } });
            paginationContainer.appendChild(prevBtn);

            for (let i = 1; i <= totalPages; i++) {
                if (totalPages > 6 && Math.abs(currentPage - i) > 2 && i !== 1 && i !== totalPages) {
                    if (i === 2 && currentPage > 4) { const dots = document.createElement('span'); dots.textContent = '...'; dots.style.padding = '0 5px'; paginationContainer.appendChild(dots); }
                    if (i === totalPages - 1 && currentPage < totalPages - 3) { const dots = document.createElement('span'); dots.textContent = '...'; dots.style.padding = '0 5px'; paginationContainer.appendChild(dots); }
                    continue;
                }
                const pageBtn = document.createElement('button');
                pageBtn.className = `btn-page ${i === currentPage ? 'active' : ''}`; pageBtn.textContent = i;
                pageBtn.addEventListener('click', () => { currentPage = i; displayPosts(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
                paginationContainer.appendChild(pageBtn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.className = 'btn-page'; nextBtn.innerHTML = '&raquo;'; nextBtn.disabled = currentPage === totalPages;
            nextBtn.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; displayPosts(); window.scrollTo({ top: 0, behavior: 'smooth' }); } });
            paginationContainer.appendChild(nextBtn);
        }

        function resetRandomHistory() {
            randomHistory = [];
            currentRandomIndex = -1;
        }

        function renderRandomNavigation() {
            randomNavContainer.innerHTML = '';
            const prevNavBtn = document.createElement('button');
            prevNavBtn.className = 'btn-nav'; prevNavBtn.innerHTML = '&larr; Bài trước'; prevNavBtn.disabled = currentRandomIndex <= 0;
            prevNavBtn.addEventListener('click', () => { if (currentRandomIndex > 0) { currentRandomIndex--; showRandomPostAtCurrentIndex(); } });

            const nextNavBtn = document.createElement('button');
            nextNavBtn.className = 'btn-nav'; nextNavBtn.innerHTML = 'Bài sau &rarr;'; nextNavBtn.disabled = currentRandomIndex >= randomHistory.length - 1;
            nextNavBtn.addEventListener('click', () => { if (currentRandomIndex < randomHistory.length - 1) { currentRandomIndex++; showRandomPostAtCurrentIndex(); } });

            randomNavContainer.appendChild(prevNavBtn);
            randomNavContainer.appendChild(nextNavBtn);
        }

        function showRandomPostAtCurrentIndex() {
            listContainer.innerHTML = '';
            paginationContainer.innerHTML = '';
            const currentPost = randomHistory[currentRandomIndex];
            renderPostCard(currentPost);
            renderRandomNavigation();
        }

        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => { searchQuery = e.target.value.trim().toLowerCase(); currentPage = 1; resetRandomHistory(); displayPosts(); }, 300);
        });

        btnRandom.addEventListener('click', () => {
            const allCurrentPosts = getActivePosts();
            if (allCurrentPosts.length === 0) { alert('Không có bài viết nào để lựa chọn!'); return; }
            if (currentRandomIndex < randomHistory.length - 1) { randomHistory = randomHistory.slice(0, currentRandomIndex + 1); }

            const randomPost = allCurrentPosts[Math.floor(Math.random() * allCurrentPosts.length)];
            randomHistory.push(randomPost);
            currentRandomIndex = randomHistory.length - 1;
            showRandomPostAtCurrentIndex();
        });

        document.querySelectorAll('.btn-source').forEach(btn => { 
            btn.addEventListener('click', (e) => { 
                document.querySelectorAll('.btn-source').forEach(b => b.classList.remove('active')); 
                e.target.classList.add('active'); 
                activeSource = e.target.getAttribute('data-source'); 
                currentPage = 1; currentDomain = 'all'; searchInput.value = ''; searchQuery = ''; resetRandomHistory(); updateCurrentForumsData(); 
            }); 
        });

        function resetToAllSource() {
            document.querySelectorAll('.btn-source').forEach(b => b.classList.remove('active'));
            const btnAll = document.querySelector('.btn-source[data-source="all"]');
            if (btnAll) btnAll.classList.add('active');
            activeSource = 'all'; currentPage = 1; currentDomain = 'all'; searchInput.value = ''; searchQuery = ''; resetRandomHistory(); updateCurrentForumsData();
        }

        window.addEventListener('DOMContentLoaded', () => loadExternalData());
    </script>
</body>
</html>
